<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .container {
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        button {
            width: 100%;
            margin-top: 15px;
            padding: 10px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #0056b3;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 4px;
            text-align: center;
            display: none;
        }

        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Student Form</h2>

    <div style="text-align: center; margin-bottom: 20px;">
        <a href="view-students.html" style="color: #007BFF; text-decoration: none; font-weight: bold;">View All Students →</a>
    </div>

    <form id="studentForm">

        <label for="id">ID</label>
        <input type="number" id="id" name="id" placeholder="Enter ID" required>

        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Enter Name" required>

        <label for="address">Address</label>
        <textarea id="address" name="address" rows="4" placeholder="Enter Address" required></textarea>

        <button type="submit">Submit</button>

    </form>
    <div id="message" class="message"></div>
</div>

<script>
    document.getElementById('studentForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const id = document.getElementById('id').value;
        const name = document.getElementById('name').value;
        const address = document.getElementById('address').value;

        const studentData = {
            id: parseInt(id),
            name: name,
            Address: address
        };

        fetch('/student/add', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(studentData)
        })
        .then(response => response.text())
        .then(data => {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = data;
            messageDiv.classList.remove('error');
            messageDiv.classList.add('success');
            document.getElementById('studentForm').reset();
        })
        .catch(error => {
            const messageDiv = document.getElementById('message');
            messageDiv.textContent = 'Error: ' + error.message;
            messageDiv.classList.remove('success');
            messageDiv.classList.add('error');
        });
    });
</script>

</body>
</html>
